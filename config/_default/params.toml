# Pages placed under these sections will be shown on homepage and archive page.
mainSections = ["report", "post"]

# Output page's full content in RSS.
rssFullContent = true
favicon        = "img/favicon.png"

# Site description (falls back to sidebar.subtitle)
description = "채권·금융 시장 분석 리포트 | 한서연"

# Accepted values: "default", "lastmod"
# default = see https://gohugo.io/quick-reference/glossary/#default-sort-order
# lastmod = sort by last modified date, in descending order
SortBy = "lastmod"

[footer]
    since      = 2025
    customText = ""

[dateFormat]
    published   = "2006. 1. 2."
    lastUpdated = "2006. 1. 2. 15:04"

[sidebar]
    emoji    = "📊"
    subtitle = "채권·금융 시장 분석 리포트"
    avatar   = "https://avatars.githubusercontent.com/u/278065915?v=4"
    compact  = false

[article]
    headingAnchor = false
    math          = false
    readingTime   = true
    toc           = true

    [article.license]
        enabled = true
        default = "Licensed under CC BY-NC-SA 4.0"

    [article.mermaid]
        look         = "classic"
        lightTheme   = "default"
        darkTheme    = "dark"
        securityLevel = "strict"

[widgets]
    homepage = [
        { type = "search" },
        { type = "archives", params = { limit = 10 } },
        { type = "categories", params = { limit = 10 } },
        { type = "tag-cloud", params = { limit = 10 } },
    ]
    page = [{ type = "toc" }]

[opengraph.twitter]
    site = ""
    card = "summary_large_image"

[colorScheme]
    toggle  = true
    default = "auto"

## Comments — 비활성화 (댓글 미사용)
[comments]
    enabled  = false
